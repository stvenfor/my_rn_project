name: agent-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run agent:check-boundary
      - run: npm run agent:check-manifest
