global:
  rules:
    - normalize_whitespace
    - fix_heading_levels
    - code_block_lang
    - compress_blank_lines
  skip_patterns:
    - "*.sheet.md"
    - "*画板*"
    - "*board*"

folders:
  默认:
    ai_content: false

