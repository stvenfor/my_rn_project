// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "33.0.0"
        minSdkVersion = 21
        compileSdkVersion = 33
        targetSdkVersion = 33

        // We use NDK 23 which has both M1 support and is the side-by-side NDK version from AGP.
        ndkVersion = "23.1.7779620"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
    }
}

// Keep androidx.core on 1.12.x so compileSdk 33 (RN 0.72 / AGP 7.4) remains valid.
subprojects { subproject ->
    subproject.configurations.configureEach { configuration ->
        configuration.resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'androidx.core' &&
                (details.requested.name == 'core' || details.requested.name == 'core-ktx')) {
                details.useVersion('1.12.0')
                details.because('M2 Android smoke: avoid compileSdk 34 requirement from androidx.core 1.13+')
            }
        }
    }
}
